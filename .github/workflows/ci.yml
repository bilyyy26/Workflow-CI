name: CI - Breast Cancer Training Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn pandas numpy matplotlib dagshub

      - name: Run preprocessing
        run: python MLProject/automate_Bily.py

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          mlflow run MLProject/ \
            -P n_estimators=100 \
            -P max_depth=5 \
            --env-manager=local

      - name: Upload MLflow artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ github.run_number }}
          path: mlruns/
          retention-days: 30

      - name: Commit artifacts to repo
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mlruns/ breast_cancer_preprocessing/ || true
          git diff --staged --quiet || git commit -m "ci: update artifacts [run #${{ github.run_number }}]"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          mlflow models build-docker \
            -m "mlruns/0/$(ls mlruns/0/ | grep -v meta | head -1)/artifacts/model" \
            -n ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-classifier:latest \
            --enable-mlserver
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-classifier:latest
